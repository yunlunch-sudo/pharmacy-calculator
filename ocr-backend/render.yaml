services:
  - type: web
    name: prescription-ocr
    runtime: python
    rootDir: ocr-backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false        # Render 대시보드에서 직접 입력 (시크릿)
      - key: EXTRA_ORIGINS
        sync: false        # (선택) 추가 허용 도메인, 쉼표 구분
