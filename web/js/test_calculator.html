let passed = 0;
let failed = 0;
let output = '';

for (const tc of testCases) {
    const result = calculate(tc.inp);
    const actual = result.totalFee;
    const ok = actual === tc.expected;
    if (ok) passed++;
    else failed++;
    const mark = ok ? 'PASS' : 'FAIL';
    output += `[${mark}] ${tc.name}: ${actual}원 ${ok ? '' : '(expected ' + tc.expected + '원)'}\n`;
}

output += `\n결과: ${passed}/${testCases.length} 통과, ${failed} 실패\n`;

document.getElementById('output').textContent = output;

if (failed > 0) {
    document.getElementById('output').style.color = 'red';
} else {
    document.getElementById('output').style.color = 'green';
}
</script>
</body>
</html>
